spring:
  datasource:
    url: jdbc:postgresql://${DATABASE_HOST}/${DATABASE_NAME}
    driver-class-name: org.postgresql.Driver
    username: ${DATABASE_USERNAME}
    password: ${DATABASE_PASSWORD}
    hikari:
      connection-timeout: 20000
      initialization-fail-timeout: 60000

  devtools:
    restart:
      enabled: false
    livereload:
      enabled: false

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

  logging:
    level:
      org.hibernate.SQL: DEBUG
      ## org.hibernate.orm.jdbc.bind: TRACE 파라미터 까지

gemini:
  api:
    key: ${GEMINI_API_KEY}
    url: https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-lite:generateContent

jwt:
  secret: ${JWT_SECRET}

google:
  play:
    package-name: ${GOOGLE_PLAY_PACKAGE_NAME:com.readme.app}
    webhook-token: ${GOOGLE_PLAY_WEBHOOK_TOKEN:}
    sync-cron: ${GOOGLE_PLAY_SYNC_CRON:0 15 3 * * *}

server:
  port: ${PORT:10000}
