spring:
  datasource:
    url: jdbc:postgresql://${DATABASE_HOST}/${DATABASE_NAME}
    driver-class-name: org.postgresql.Driver
    username: ${DATABASE_USERNAME}
    password: ${DATABASE_PASSWORD}
    hikari:
      maximum-pool-size: ${DATABASE_MAX_POOL_SIZE:4}
      minimum-idle: ${DATABASE_MIN_IDLE:1}
      connection-timeout: 20000
      idle-timeout: 300000
      max-lifetime: 900000

  profiles:
    active: dev

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    properties:
      hibernate:
        format_sql: true

server:
  port: ${PORT:8080}

gemini:
  api:
    key: ${GEMINI_API_KEY}       #key: ${GEMINI_API_KEY}  # 이건 환경 변수에서 가져오라는 뜻
    url: https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-lite:generateContent

jwt:
  secret: ${JWT_SECRET}  # JWT_SECRET

google:
  play:
    package-name: ${GOOGLE_PLAY_PACKAGE_NAME:com.readme.app}
    webhook-token: ${GOOGLE_PLAY_WEBHOOK_TOKEN:}
    sync-cron: ${GOOGLE_PLAY_SYNC_CRON:0 15 3 * * *}
